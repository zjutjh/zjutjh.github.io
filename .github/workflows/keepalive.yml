name: Keepalive Empty Commit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Check recent commits and push empty commit if needed
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          git fetch origin "$DEFAULT_BRANCH"

          if git rev-list -1 --since="1 month ago" "origin/$DEFAULT_BRANCH" >/dev/null; then
            echo "Found commits in the last month on $DEFAULT_BRANCH. No keepalive commit needed."
            exit 0
          fi

          echo "No commits found in the last month on $DEFAULT_BRANCH. Creating empty keepalive commit."
          git config user.name "zjutjh-bot"
          git config user.email "zjutjh@outlook.com"
          git commit --allow-empty -m "chore: monthly keepalive commit"
          git push origin "HEAD:$DEFAULT_BRANCH"
